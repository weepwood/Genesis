name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  runtime-test:
    name: 启动主场景并检查 UI
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载 Godot 4.4.1
        run: |
          curl -L --fail --retry 3 \
            -o godot.zip \
            https://github.com/godotengine/godot-builds/releases/download/4.4.1-stable/Godot_v4.4.1-stable_linux.x86_64.zip
          unzip -q godot.zip
          chmod +x Godot_v4.4.1-stable_linux.x86_64

      - name: 运行主场景烟雾测试
        run: |
          set -o pipefail
          ./Godot_v4.4.1-stable_linux.x86_64 \
            --headless \
            --path . \
            --quit-after 8 \
            --verbose 2>&1 | tee runtime.log

          if grep -E "SCRIPT ERROR|Parse Error|Invalid call|Invalid get index|Failed to load script" runtime.log; then
            echo "检测到 Godot 运行时错误"
            exit 1
          fi

          if ! grep -q "GENESIS_UI_READY" runtime.log; then
            echo "主界面没有完成初始化"
            exit 1
          fi

      - name: 上传运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Genesis-Runtime-Log
          path: runtime.log
          if-no-files-found: warn
          retention-days: 7

  export-windows:
    name: 导出 Windows 版本
    needs: runtime-test
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 导出 Godot Windows 版本
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.4.1-stable/Godot_v4.4.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.4.1-stable/Godot_v4.4.1-stable_export_templates.tpz
          relative_project_path: ./
          presets_to_export: Windows Desktop
          archive_output: true
          archive_root_folder: true
          cache: true
          verbose: true

      - name: 检查导出结果
        run: |
          echo "构建目录：${{ steps.export.outputs.build_directory }}"
          echo "压缩包目录：${{ steps.export.outputs.archive_directory }}"
          find "${{ steps.export.outputs.build_directory }}" -maxdepth 3 -type f -print
          find "${{ steps.export.outputs.archive_directory }}" -maxdepth 2 -type f -print

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: Genesis-Windows
          path: ${{ steps.export.outputs.archive_directory }}/*
          if-no-files-found: error
          retention-days: 14
